<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>lizhenghao</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #f5efe7;
      color: #241713;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(92vw, 760px);
      padding: 56px 32px;
      text-align: center;
      border: 3px solid #241713;
      background: #fffaf2;
      box-shadow: 14px 14px 0 #d28b51;
    }

    h1 {
      margin: 0;
      font-size: clamp(42px, 9vw, 96px);
      line-height: 1.05;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }
  </style>
</head>
<body>
  <main>
    <h1>lizhenghao！！亩</h1>
  </main>
</body>
</html>
